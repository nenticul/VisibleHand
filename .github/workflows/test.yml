name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type check ──────────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy types-requests

      - name: Ruff check
        run: ruff check api/ core/ sdk/ scripts/ --output-format=github

      - name: Ruff format check
        run: ruff format api/ core/ sdk/ scripts/ --check

      - name: Syntax check (fast)
        run: python -m compileall -q api core sdk scripts

  # ── Tests (matrix) ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi "uvicorn[standard]" pydantic pydantic-settings \
            slowapi sqlalchemy httpx numpy scipy tenacity alembic \
            pytest pytest-asyncio pytest-cov pytest-env

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          INGESTION_ENABLED: "false"
          ENVIRONMENT: "development"
          OPENBLAS_NUM_THREADS: "1"
          OMP_NUM_THREADS: "1"
        run: |
          pytest tests/ -v --tb=short \
            --cov=api --cov=core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Smoke test (seed + API) ────────────────────────────────────────────────
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install \
            fastapi "uvicorn[standard]" pydantic pydantic-settings \
            slowapi sqlalchemy httpx numpy scipy tenacity alembic

      - name: Run migrations + seed
        env:
          DATABASE_URL: "sqlite:///./vh_ci.db"
          INGESTION_ENABLED: "false"
          OPENBLAS_NUM_THREADS: "1"
        run: |
          python -c "import alembic.config; alembic.config.main(argv=['upgrade', 'head'])"
          python -m scripts.seed_demo_data

      - name: Smoke test all endpoints
        env:
          DATABASE_URL: "sqlite:///./vh_ci.db"
          INGESTION_ENABLED: "false"
          OPENBLAS_NUM_THREADS: "1"
        run: python -m scripts.smoke_test

  # ── SDK package check ──────────────────────────────────────────────────────
  sdk:
    name: SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: pip install hatchling build

      - name: Build SDK wheel
        working-directory: sdk
        run: python -m build --wheel --no-isolation

      - name: Verify wheel installs
        working-directory: sdk
        run: |
          pip install dist/*.whl
          python -c "from visiblehand import Client, AsyncClient, RiskScore; print('SDK OK')"
