services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: visiblehand
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d visiblehand"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/visiblehand
      FRED_API_KEY: ${FRED_API_KEY:-}
      API_KEY: ${API_KEY:-}
      INGESTION_ENABLED: ${INGESTION_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn api.main:app --host 0.0.0.0 --port 8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
